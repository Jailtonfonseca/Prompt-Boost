name: CI - Test and Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prompt_boost_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov pytest-docker black flake8 mypy
    
    - name: Lint with flake8
      working-directory: backend
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    
    - name: Format check with black
      working-directory: backend
      run: |
        black --check src tests || true
    
    - name: Type check with mypy
      working-directory: backend
      run: |
        mypy src --ignore-missing-imports || true
    
    - name: Run database migrations
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prompt_boost_test
        DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/prompt_boost_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        alembic upgrade head
    
    - name: Run unit tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prompt_boost_test
        DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/prompt_boost_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
      run: |
        pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Run integration tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prompt_boost_test
        DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/prompt_boost_test
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: test
      run: |
        pytest tests/integration -v --cov=src --cov-append --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Comment PR with coverage
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}
        MINIMUM_GREEN: 70
        MINIMUM_ORANGE: 50
