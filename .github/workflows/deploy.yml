name: Deploy to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend/k8s/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Get image tag
      id: image
      run: |
        echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
    
    - name: Create namespace if not exists
      run: |
        kubectl create namespace prompt-boost --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Apply Kubernetes ConfigMap
      run: |
        kubectl apply -f backend/k8s/configmap.yaml -n prompt-boost
    
    - name: Apply Kubernetes Secrets
      if: secrets.KUBE_SECRETS != ''
      run: |
        echo "${{ secrets.KUBE_SECRETS }}" | kubectl apply -f - -n prompt-boost
    
    - name: Apply RBAC manifests
      run: |
        kubectl apply -f backend/k8s/rbac.yaml -n prompt-boost
    
    - name: Update Deployment image
      run: |
        kubectl set image deployment/prompt-boost-backend \
          backend=${{ steps.image.outputs.tag }} \
          -n prompt-boost
    
    - name: Rollout status
      run: |
        kubectl rollout status deployment/prompt-boost-backend -n prompt-boost --timeout=5m
    
    - name: Apply Ingress
      run: |
        kubectl apply -f backend/k8s/ingress.yaml -n prompt-boost
    
    - name: Verify deployment
      run: |
        kubectl get deployment,service,ingress,pods -n prompt-boost
        
        # Wait for pods to be ready
        kubectl wait --for=condition=available --timeout=300s \
          deployment/prompt-boost-backend -n prompt-boost
    
    - name: Get service info
      run: |
        echo "Service endpoints:"
        kubectl get endpoints prompt-boost-backend -n prompt-boost
        echo ""
        echo "Ingress info:"
        kubectl get ingress -n prompt-boost
    
    - name: Health check
      run: |
        POD_NAME=$(kubectl get pods -n prompt-boost -l app=prompt-boost,component=backend -o jsonpath='{.items[0].metadata.name}')
        kubectl exec -n prompt-boost $POD_NAME -- curl -s http://localhost:8000/health
    
    - name: Notify Slack on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment to Kubernetes failed'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
    
    - name: Notify Slack on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment to Kubernetes successful'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
