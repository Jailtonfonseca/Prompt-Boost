---
# Ingress for Prompt-Boost Backend
# Supports both REST API and WebSocket connections
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prompt-boost-ingress
  namespace: default
  labels:
    app: prompt-boost
    component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "prompt-boost-backend"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    
    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    
    # Rate limiting (per IP)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # SSL redirect (if using cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  
  # TLS configuration (requires cert-manager)
  tls:
  - hosts:
    - api.yourdomain.com
    secretName: prompt-boost-tls
  
  rules:
  # Main API routes
  - host: api.yourdomain.com
    http:
      paths:
      # REST API endpoints
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: prompt-boost-backend
            port:
              number: 8000
      
      # WebSocket endpoints
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: prompt-boost-backend
            port:
              number: 8000
      
      # Monitoring endpoints (restricted in production)
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: prompt-boost-backend
            port:
              number: 8000
      
      - path: /health
        pathType: Exact
        backend:
          service:
            name: prompt-boost-backend
            port:
              number: 8000
  
  # Alternative: subdomain-based routing
  - host: app.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prompt-boost-backend
            port:
              number: 8000

---
# Network Policy to restrict traffic (optional but recommended)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prompt-boost-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: prompt-boost
      component: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  # Allow internal traffic from same namespace
  - from:
    - podSelector:
        matchLabels:
          app: prompt-boost
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external HTTPS (for LLM APIs)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
