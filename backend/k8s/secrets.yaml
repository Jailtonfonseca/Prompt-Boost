---
# Secrets for Prompt-Boost Backend - IMPORTANT: Use sealed-secrets or external-secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: prompt-boost-secrets
  namespace: default
  labels:
    app: prompt-boost
    component: secrets
type: Opaque
stringData:
  # Database connection (format: postgresql+asyncpg://user:password@host:port/dbname)
  # CHANGE THESE VALUES IN PRODUCTION
  database_url: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/prompt_boost"
  
  # Redis connection (format: redis://:password@host:port/db)
  redis_url: "redis://redis-service:6379/0"
  
  # LLM API Keys (leave empty if not using that provider)
  openai_api_key: "sk-your-openai-key-here"
  anthropic_api_key: "your-anthropic-key-here"
  gemini_api_key: "your-gemini-key-here"
  
  # JWT Secret for token signing (change in production)
  secret_key: "your-super-secret-jwt-key-change-in-production-use-openssl-rand-hex"
  
  # Optional: Admin credentials
  admin_email: "admin@example.com"
  admin_password: "change-me-in-production"
  
  # Optional: Sentry DSN for error tracking
  sentry_dsn: "https://your-sentry-dsn@sentry.io/project-id"
  
  # Optional: Slack webhook for alerts
  slack_webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
